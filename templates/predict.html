<!DOCTYPE html>
<html>
<head>
    <title>Loan Prediction</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">
<h1>Loan Prediction Form</h1>

<form action="/result" method="POST">

<label>Gender</label><br>
<select name="Gender">
<option>Male</option>
<option>Female</option>
</select><br><br>

<label>Married</label><br>
<select name="Married">
<option>Yes</option>
<option>No</option>
</select><br><br>

<label>Dependents</label><br>
<input type="text" name="Dependents"><br><br>

<label>Education</label><br>
<select name="Education">
<option>Graduate</option>
<option>Not Graduate</option>
</select><br><br>

<label>Self Employed</label><br>
<select name="Self_Employed">
<option>Yes</option>
<option>No</option>
</select><br><br>

<label>Applicant Income</label><br>
<input type="number" name="ApplicantIncome"><br><br>

<label>Coapplicant Income</label><br>
<input type="number" name="CoapplicantIncome"><br><br>

<label>Loan Amount</label><br>
<input type="number" name="LoanAmount"><br><br>

<label>Loan Amount Term</label><br>
<input type="number" name="Loan_Amount_Term"><br><br>

<label>Credit History</label><br>
<select name="Credit_History">
<option>1</option>
<option>0</option>
</select><br><br>

<label>Property Area</label><br>
<select name="Property_Area">
<option>Urban</option>
<option>Semiurban</option>
<option>Rural</option>
</select><br><br>

<input type="submit" value="Predict">

</form>

</div>

</body>
</html>
