<!DOCTYPE html>
<html>

<head>
    <title>Smart Lender</title>

    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
            background-color:#f2f2f2;
            text-align:center;
            margin:0;
            padding:0;
        }

        .container{
            width:50%;
            margin:100px auto;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0px 0px 10px gray;
        }

        h1{
            color:#04AA6D;
        }

        button{
            background:#04AA6D;
            color:white;
            padding:12px 25px;
            border:none;
            border-radius:5px;
            font-size:18px;
            cursor:pointer;
        }

        button:hover{
            background:#038f5a;
        }
    </style>

</head>

<body>

<div class="container">

    <h1>Smart Loan Approval Prediction</h1>

    <p>Welcome to the Loan Prediction System</p>

    <form action="/predict" method="get">
        <button type="submit">Predict</button>
    </form>

</div>

</body>

</html>
